name: CI

# Test + build on PRs to master and on pushes to master (i.e. after a PR merge).
# workflow_dispatch lets you run it manually on any branch.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ./server
          pip install requests websocket-client
      - name: Run unit tests
        working-directory: server/tests
        run: python -m unittest -v test_api.py

  e2e-tests:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install redis-server (the e2e launcher starts its own instance)
        run: sudo apt-get update && sudo apt-get install -y redis-server
      - name: Install backend
        run: pip install -e ./server
      - name: Install client dependencies
        working-directory: client
        run: npm ci
      - name: Install Playwright browser
        working-directory: client
        run: npx playwright install --with-deps chromium
      - name: Run E2E suite (builds client, then runs Playwright)
        working-directory: client
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report
          retention-days: 7

  build:
    name: Build client
    needs: [backend-tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Build
        working-directory: client
        run: |
          npm ci
          npm run build
      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7
